<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
        }

        #title {
            color: gold;
        }

        .container {
            display: none;
            grid-template-rows: auto auto;
            margin: 10px;
            padding: 10px;
            /* width: 50%; */
            background-color: rgb(150, 150, 150);
            box-shadow: 0px 0px 10px;
            border: 8px outset rgb(175, 175, 175);
        }

        #actions button {
            box-shadow: 0px 0px 5px black;
            color: white;
            font-weight: bold;
        }

        #info {
            display: none;
            grid-template-columns: auto 50% auto;
        }

        #info > *{
            border: 5px inset rgb(125, 125, 125);
            background-color: rgb(100, 100, 100);
            color: gold;
            padding-left: 8px;
        }

        #history {
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px;
        }

        #actions {
            display: none;
            justify-content: space-around;
            /* border-top: 1px solid black; */
            padding-top: 10px;
        }

        body {
            background-color: rgb(88, 66, 45) !important;
            font-family: "Times New Roman", Georgia, "Garamond", serif !important;
        }
    </style>
</head>

<body>
    <!-- Title Menu -->
     <div class="menu">
        <h1 id="title">A Game</h1>
        <button onclick="startGame()" class="btn btn-secondary" id="start">Start</button>
     </div>
    <!-- Game Screen -->
    <div class="container">
        <!-- Info -->
        <div id="info">
            <!-- Player  -->
            <div id="player">
                <table id="playerStats">
                    <tr><th colspan="2">Your stats</th></tr>
                    <tr><th>HP:</th><td>0</td></tr>
                    <tr><th>MP:</th><td>0</td></tr>
                </table>
            </div>
            <!-- History  -->
            <div id="history">
                History
            </div>
            <!-- Enemy -->
            <div id="enemy">
                <table id="enemyStats">
                    <tr>
                        <th colspan="2">Enemy stats</th>
                    </tr>
                    <tr>
                        <th>HP:</th>
                        <td>0</td>
                    </tr>
                    <tr>
                        <th>MP:</th>
                        <td>0</td>
                    </tr>
                </table>
            </div>
        </div>
        <!-- Actions -->
        <div id="actions">
            <!-- Attack  -->
            <button onclick="attack()" class="btn btn-danger">Attack</button>
            <!-- Defend  -->
            <button onclick="defend()" class="btn btn-secondary">Defend</button>
            <!-- Spell  -->
            <button onclick="spell()" class="btn btn-info">Spells</button>
        </div>
    </div>

    <script>
        let pHP = 100;
        let pMP = 100;
        let eHP = 100;
        let eMP = 100;
        let incomingDamage = 0;

        const states = {
            PLAYER: "playerTurn",
            ENEMY: "enemyTurn",
            GAME_OVER: "gameOver"
        };
        let gameState = states.PLAYER;

        const enemyAction = {
            NORMAL: "normalAttack",
            POWER: "powerAttack",
            SHIELD: "magicShield"
        };
        let enemyCurrAct = enemyAction.NORMAL;

        let playerTurn = true;
        let playerBlock = false;

        const showUI = ["info", "actions"];
        const hideUI = ["title", "start"];

        const pTable = document.getElementById("playerStats");
        const pHealth = pTable.rows[1].cells[1];
        const pMagick = pTable.rows[2].cells[1];

        const eTable = document.getElementById("enemyStats");
        const eHealth = eTable.rows[1].cells[1];
        const eMagick = eTable.rows[2].cells[1];

        const historyDiv = document.getElementById("history")

        function showGameUI() {
            document.querySelector(".container").style.display = "grid";

            document.getElementById("info").style.display = "grid";
            document.getElementById("actions").style.display = "flex";

            for (let UI of hideUI)
                document.getElementById(UI).style.display = "none";
        }

        function startGame() {
            // Show interface
            showGameUI();
            
            // Player stats
            pHealth.textContent = pHP;
            pMagick.textContent = pMP;

            // Enemy stats
            eHealth.textContent = eHP;
            eMagick.textContent = eMP;
            
            historyDiv.textContent = "Game Start";
        }

        function updateStats() {
            // Set stats
            pHealth.textContent = pHP;
            eHealth.textContent = eHP;
            pMagick.textContent = pMP;
            eMagick.textContent = eMP;
            // Player dead
            if (pHP <= 0) {
                if (pHP < 0)
                    pHP = 0;
                gameState = states.GAME_OVER;
                historyDiv.textContent = "Game Over";
            }
            // Enemy dead
            if (eHP <= 0) {
                if (eHP < 0)
                    eHP = 0;
                gameState = states.GAME_OVER;
                historyDiv.textContent = "Enemy defeated";
            }
        }

        function attack() {
            if (gameState !== states.PLAYER)
                return;
            // Do random damage to enemy
            let damage = Math.floor(Math.random() * 10) + 5;
            if (enemyCurrAct === enemyAction.SHIELD) {
                damage /= 2;
            }
            eHP -= damage;
            // Update history
            historyDiv.innerHTML = `You did <strong>${damage}</strong> damage.`;
            // Update stats
            updateStats();
            // Enemy's turn
            gameState = states.ENEMY;
            enemyTurn();
        }

        function defend() {
            if (gameState !== states.PLAYER)
                return;
            playerBlock = true;
            historyDiv.textContent = "You brace for the next attack.";
            gameState = states.ENEMY;
            enemyTurn()
        }

        function spell() {
            if (gameState !== states.PLAYER)
                return;
            // Do random damage to enemy
            if (pMP > 0) {
                let damage = Math.floor(Math.random() * 20) + 5;
                eHP -= damage;
                pMP -= 20;
                // Update history
                historyDiv.innerHTML = `You cast a fire spell, doing <strong>${damage}</strong> damage.`;
                // Update stats
                updateStats();
                // Enemy's turn
                gameState = states.ENEMY;
                enemyTurn();
            }
            else {
                historyDiv.textContent = `Not enough magick!`;
            }
        }

        function enemyTurn() {
            if (gameState !== states.ENEMY)
                return;
            setTimeout(() => {
                // Do random damage to player
                let damage = Math.floor(Math.random() * 10) + 3;
                // Attack is power attack
                if (enemyCurrAct === enemyAction.POWER) {
                    damage *= 2;
                }
                // If player is blocking
                if (playerBlock) {
                    // Half damage
                    damage = Math.floor(damage / 2);
                    playerBlock = false;
                    historyDiv.innerHTML = `You block the enemy's attack. Enemy did <strong>${damage}</strong> damage.`;
                }
                else {
                    historyDiv.innerHTML = `Enemy did <strong>${damage}</strong> damage.`;
                }
                // Damage player
                pHP -= damage;
                nextAction();
                // Update stats
                updateStats();
                // Player's turn
                gameState = states.PLAYER;
            }, 1000);
        }

        function nextAction() {
            let randVal = Math.random();
            // Normal attack
            if (randVal < 0.50) {
                enemyCurrAct = enemyAction.NORMAL;
            }
            // Shield
            else if (randVal < 0.75) {
                enemyCurrAct = enemyAction.SHIELD;
                historyDiv.textContent += " Enemy's is blocking your next physical attack!"
            }
            // Power Attack
            else {
                enemyCurrAct = enemyAction.POWER;
                historyDiv.textContent += " Enemy's next attack is a power attack!"
            }
        }
    </script>
</body>

</html>
