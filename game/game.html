<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game</title>

    <link rel="stylesheet" href="game.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="game.js" defer></script>
</head>

<body>
    <!-- Title Menu -->
     <div class="menu">
        <h1 id="title">A Game</h1>
        <button onclick="startGame()" class="btn btn-secondary" id="start">Start</button>
     </div>
    <!-- Game Screen -->
    <div class="container">
        <!-- Info -->
        <div id="info">
            <!-- Player  -->
            <div id="player">
                <table id="playerStats">
                    <tr><th colspan="2">Your stats</th></tr>
                    <tr><th>HP:</th><td>0</td></tr>
                    <tr><th>MP:</th><td>0</td></tr>
                </table>
            </div>
            <!-- History  -->
            <div id="history">
                History
            </div>
            <!-- Enemy -->
            <div id="enemy">
                <table id="enemyStats">
                    <tr>
                        <th colspan="2">Enemy stats</th>
                    </tr>
                    <tr>
                        <th>HP:</th>
                        <td>0</td>
                    </tr>
                    <tr>
                        <th>MP:</th>
                        <td>0</td>
                    </tr>
                </table>
            </div>
        </div>
        <!-- Actions -->
        <div id="actions">
            <!-- Attack  -->
            <button onclick="attack()" class="btn btn-danger">Attack</button>
            <!-- Defend  -->
            <button onclick="defend()" class="btn btn-secondary">Defend</button>
            <!-- Spell  -->
            <button onclick="spell()" class="btn btn-info">Spells</button>
        </div>
    </div>

</body>
</html>
